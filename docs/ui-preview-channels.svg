  <rect x="1042" y="218" width="140" height="38" rx="9" fill="#1a2432" stroke="#2c3a4e"/><text x="1090" y="242" fill="#dfe8f4" font-size="13" font-family="Arial, sans-serif">Disable</text>

  <rect x="312" y="446" width="1050" height="400" rx="12" fill="#0d1520" stroke="#253547"/>
  <text x="336" y="482" fill="#edf3fb" font-size="19" font-family="Arial, sans-serif" font-weight="700">Telegram Helper</text>
  <rect x="336" y="506" width="220" height="36" rx="9" fill="#1a2432" stroke="#2c3a4e"/><text x="408" y="529" fill="#dfe8f4" font-size="13" font-family="Arial, sans-serif">Start Reconnect</text>
  <text x="336" y="574" fill="#8ea0b7" font-size="13" font-family="Arial, sans-serif">1. Open @BotFather</text>
  <rect x="520" y="552" width="150" height="36" rx="9" fill="#1a2432" stroke="#2c3a4e"/><text x="576" y="575" fill="#dfe8f4" font-size="13" font-family="Arial, sans-serif">Copy Link</text>
  <text x="336" y="618" fill="#8ea0b7" font-size="13" font-family="Arial, sans-serif">2. Run command /newbot</text>
  <rect x="520" y="596" width="170" height="36" rx="9" fill="#1a2432" stroke="#2c3a4e"/><text x="574" y="619" fill="#dfe8f4" font-size="13" font-family="Arial, sans-serif">Copy /newbot</text>
  <text x="336" y="664" fill="#8ea0b7" font-size="13" font-family="Arial, sans-serif">3. Paste bot token</text>
  <rect x="336" y="676" width="620" height="44" rx="8" fill="#0b1119" stroke="#2b4055"/>
  <text x="352" y="703" fill="#dfe8f4" font-size="13" font-family="Arial, sans-serif">123456789:AAExampleBotToken</text>
  <rect x="968" y="676" width="160" height="44" rx="9" fill="#133b26" stroke="#22b663"/>
  <text x="1026" y="703" fill="#ecfff3" font-size="13" font-family="Arial, sans-serif" font-weight="700">Save Token</text>
