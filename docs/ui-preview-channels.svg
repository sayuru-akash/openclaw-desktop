  <rect x="34" y="312" width="216" height="30" rx="8" fill="#1a2432" stroke="#2c3a4e"/><text x="50" y="332" fill="#dfe8f4" font-size="12" font-family="Arial, sans-serif">Settings</text>
  <rect x="34" y="348" width="216" height="30" rx="8" fill="#133b26" stroke="#22b663"/><text x="50" y="368" fill="#ebfff3" font-size="12" font-family="Arial, sans-serif" font-weight="700">Channels</text>
  <rect x="34" y="384" width="216" height="30" rx="8" fill="#1a2432" stroke="#2c3a4e"/><text x="50" y="404" fill="#dfe8f4" font-size="12" font-family="Arial, sans-serif">Model</text>
  <rect x="34" y="420" width="216" height="30" rx="8" fill="#1a2432" stroke="#2c3a4e"/><text x="50" y="440" fill="#dfe8f4" font-size="12" font-family="Arial, sans-serif">Files</text>

  <rect x="284" y="18" width="1138" height="864" rx="14" fill="#111822" stroke="#223043"/>
