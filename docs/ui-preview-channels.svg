  <text x="312" y="78" fill="#8ea0b7" font-size="14" font-family="Arial, sans-serif">WhatsApp + Telegram management</text>
  <rect x="1190" y="40" width="172" height="36" rx="9" fill="#1a2432" stroke="#2c3a4e"/>
  <text x="1251" y="63" fill="#dfe8f4" font-size="13" font-family="Arial, sans-serif">Refresh</text>

