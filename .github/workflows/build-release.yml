name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run dist:win
            verify_cmd: npm run verify:artifacts:win
            asset_glob: |
              release/*.exe
              release/*.yml
              release/*.blockmap
          - os: macos-latest
            build_cmd: npm run dist:mac
            verify_cmd: npm run verify:artifacts:mac
            asset_glob: |
              release/*.dmg
              release/*.pkg
              release/*.zip
              release/latest-mac.yml
              release/*.blockmap
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
        shell: bash

      - name: Build & Package
        run: ${{ matrix.build_cmd }}

      - name: Verify artifacts
        run: ${{ matrix.verify_cmd }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_glob }}
          draft: false
          generate_release_notes: true
